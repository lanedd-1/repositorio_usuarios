spring.application.name=gestion_direccion
#agregamos el puerto
server.port=8084
#ubicacion de la BD
spring.datasource.url=jdbc:mysql://localhost:3306/usuarios_db
#validaciones para ingresar a la BD
spring.datasource.username=root
spring.datasource.password=
#driver a utilizar para la BD
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
#JPA
#Metodo paara la creacion de tablas
#si no existen las tablas las crea y si existen verifica que no se tenga que modificar
spring.jpa.hibernate.ddl-auto=create
#propiedades para mostrar las sentencias SQL que se ejecutan en el microservicio internamente
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

